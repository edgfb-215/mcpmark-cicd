name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Triage Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();
            const labelsToAdd = ['needs-triage'];

            // Add category labels based on title
            if (title.includes('bug')) {
              labelsToAdd.push('bug');
            }
            if (title.includes('epic')) {
              labelsToAdd.push('epic');
            }
            if (title.includes('maintenance')) {
              labelsToAdd.push('maintenance');
            }

            // Add priority labels (highest priority first)
            const priorityKeywords = [
              { keywords: ['critical', 'urgent', 'production', 'outage'], label: 'priority-critical' },
              { keywords: ['important', 'high', 'blocking'], label: 'priority-high' },
              { keywords: ['medium', 'normal'], label: 'priority-medium' },
              { keywords: ['low', 'nice-to-have', 'minor'], label: 'priority-low' }
            ];

            let priorityAdded = false;
            for (const { keywords, label } of priorityKeywords) {
              if (keywords.some(k => title.includes(k) || body.includes(k))) {
                labelsToAdd.push(label);
                priorityAdded = true;
                break;
              }
            }
            if (!priorityAdded) {
              labelsToAdd.push('priority-medium');
            }

            // Add labels to issue
            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: labelsToAdd
            });

  task-breakdown:
    needs: issue-triage
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Create Epic Subtasks
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const parentTitle = issue.title;
            const parentNumber = issue.number;
            const subtasks = [
              { name: 'Requirements Analysis' },
              { name: 'Design and Architecture' },
              { name: 'Implementation' },
              { name: 'Testing and Documentation' }
            ];

            const subtaskNumbers = [];

            // Create each subtask
            for (let i = 0; i < subtasks.length; i++) {
              const task = subtasks[i];
              const subtaskTitle = `[SUBTASK] ${parentTitle} - Task ${i + 1}: ${task.name}`;
              const subtaskBody = `Related to #${parentNumber}`;

              const subtask = await github.rest.issues.create({
                owner: issue.owner,
                repo: issue.repo,
                title: subtaskTitle,
                body: subtaskBody,
                labels: ['enhancement', 'needs-review']
              });

              subtaskNumbers.push(subtask.data.number);
            }

            // Update parent issue with checklist
            const checklist = subtaskNumbers.map(num => `- [ ] #${num}`).join('\n');
            const newBody = (issue.body || '') + `\n\n## Epic Tasks\n${checklist}`;

            await github.rest.issues.update({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: parentNumber,
              body: newBody
            });

  auto-response:
    needs: [issue-triage, task-breakdown]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Auto-respond to Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const author = issue.user.login;
            const labels = issue.labels.map(l => l.name);
            let response = '';
            let milestone = null;

            // Check if first-time contributor in this repo
            const contributions = await github.rest.repos.listContributors({
              owner: issue.owner,
              repo: issue.repo,
              per_page: 100
            });
            const contributors = contributions.data.map(c => c.login);
            const isFirstTime = !contributors.includes(author);

            if (isFirstTime) {
              await github.rest.issues.addLabels({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                labels: ['first-time-contributor']
              });
              response += 'Welcome to the repository! This is your first issue here. ';
            }

            // Determine response based on category
            if (labels.includes('bug')) {
              response += 'Please review our [Bug Report Guidelines](.github/ISSUE_TEMPLATE/bug_report.md) to ensure all necessary information is provided.';
            } else if (labels.includes('epic')) {
              response += 'Please review our [Feature Request Process](.github/ISSUE_TEMPLATE/feature_request.md) for more details on how we handle feature requests.';
            } else if (labels.includes('maintenance')) {
              response += 'Please review our [Maintenance Guidelines](.github/ISSUE_TEMPLATE/maintenance_report.md) for more details on maintenance tasks.';
            }

            // Post comment
            await github.rest.issues.createComment({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              body: response
            });

            // Set milestone for high/critical priority
            if (labels.includes('priority-high') || labels.includes('priority-critical')) {
              // Check if milestone v1.0.0 exists
              const milestones = await github.rest.issues.listMilestones({
                owner: issue.owner,
                repo: issue.repo,
                state: 'open'
              });
              const v1Milestone = milestones.data.find(m => m.title === 'v1.0.0');
              if (v1Milestone) {
                milestone = v1Milestone.number;
              } else {
                // Create milestone if it doesn't exist
                const newMilestone = await github.rest.issues.createMilestone({
                  owner: issue.owner,
                  repo: issue.repo,
                  title: 'v1.0.0'
                });
                milestone = newMilestone.data.number;
              }

              await github.rest.issues.update({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                milestone: milestone
              });
            }

            // Update status from needs-triage to needs-review
            await github.rest.issues.removeLabel({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              name: 'needs-triage'
            });
            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: ['needs-review']
            });